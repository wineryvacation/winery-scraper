name: Hotel Availability Scrape

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      days_ahead:
        description: "Wie viele Tage scrapen? (35 für Chunk, 90 für wöchentlich)"
        required: true
        default: "90"
        type: string
      start_offset:
        description: "Ab welchem Tag relativ zu morgen starten? (0=ab morgen, 38=ab 08.06.2026, ...)"
        required: true
        default: "0"
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dependencies installieren
        run: pip install apify-client httpx

      - name: Scraper ausführen
        run: python scraper/main.py
        env:
          APIFY_TOKEN:   ${{ secrets.APIFY_TOKEN }}
          MAKE_API_KEY:  ${{ secrets.MAKE_API_KEY }}
          DAYS_AHEAD:    ${{ github.event.inputs.days_ahead || '90' }}
          START_OFFSET:  ${{ github.event.inputs.start_offset || '0' }}

      - name: Zusammenfassung
        if: always()
        run: |
          echo "### Scraper Run" >> $GITHUB_STEP_SUMMARY
          echo "Tage voraus: ${{ github.event.inputs.days_ahead || '90' }}" >> $GITHUB_STEP_SUMMARY
          echo "Start-Offset: ${{ github.event.inputs.start_offset || '0' }}" >> $GITHUB_STEP_SUMMARY
          echo "Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
