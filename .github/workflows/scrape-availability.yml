name: Weekly Hotel Availability Scrape
on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Dependencies installieren
        run: pip install apify-client httpx
      - name: Scraper ausführen
        run: python scraper/main.py
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          MAKE_API_KEY: ${{ secrets.MAKE_API_KEY }}
